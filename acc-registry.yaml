# ACC 工具注册表

settings:
  maxConcurrentConnections: 20
  idleTimeoutMs: 300000
  features:
    dynamicHelp: false
    search: false
    batch: false

sources:
  # 开发者工具 — ACC 自身的开发辅助脚本
  - type: script
    name: devtools
    group: dev
    path: "./scripts"

